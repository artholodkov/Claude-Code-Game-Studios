<!DOCTYPE html>
<!-- PROTOTYPE - NOT FOR PRODUCTION -->
<!-- Question: Does isometric voxel Tetris with fake RT (Reflector + Bloom) look good and stay readable? -->
<!-- Date: 2026-04-16 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Voxel Tetris RTX — Prototype</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 20px; right: 20px;
      color: #fff; text-align: right; pointer-events: none;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    #ui .label { font-size: 11px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }
    #ui .value { font-size: 28px; font-weight: bold; margin-bottom: 16px; }
    #next-label { font-size: 11px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 1px;
      pointer-events: none;
    }
    #gameover {
      display: none; position: fixed; inset: 0;
      align-items: center; justify-content: center; flex-direction: column;
      background: rgba(0,0,0,0.7); color: #fff;
    }
    #gameover h1 { font-size: 48px; letter-spacing: 4px; margin-bottom: 12px; text-shadow: 0 0 30px #ff4444; }
    #gameover p  { font-size: 16px; opacity: 0.6; }
    #gameover.show { display: flex; }
  </style>
</head>
<body>
  <div id="ui">
    <div class="label">Score</div>
    <div class="value" id="score">0</div>
    <div class="label">Level</div>
    <div class="value" id="level">1</div>
    <div class="label">Lines</div>
    <div class="value" id="lines">0</div>
  </div>
  <div id="controls">← → move &nbsp;|&nbsp; ↑ rotate &nbsp;|&nbsp; ↓ soft drop &nbsp;|&nbsp; Space hard drop</div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <p>Press R to restart</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
